framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    php_errors:
        log: true

    serializer:
        enabled: true

    validation:
        enabled: true
        email_validation_mode: html5

    property_info:
        enabled: true

    test: false

when@prod:
    framework:
        router:
            strict_requirements: null
